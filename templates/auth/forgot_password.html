<!DOCTYPE html>
<html>
<head>
    <title>Forgot Password - Chat App</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 400px; margin: 0 auto; padding: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; }
        input { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 10px 20px; background: #0084ff; color: white; border: none; border-radius: 4px; cursor: pointer; }
        .message { margin-top: 15px; color: green; }
        .error { color: red; }
    </style>
</head>
<body>
    <h2>Forgot Password</h2>
    <p>Enter your email address and we'll send you a link to reset your password.</p>
    <form id="forgot-form">
        <div class="form-group">
            <label>Email</label>
            <input type="email" id="email" required>
        </div>
        <button type="submit">Send Reset Link</button>
        <div id="message" class="message"></div>
        <div id="error" class="error"></div>
    </form>
    <div class="link">
        <a href="/login/">Back to Login</a>
    </div>

    <script>
        document.getElementById('forgot-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            
            const response = await fetch('/api/auth/forgot-password/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email })
            });
            
            if (response.ok) {
                document.getElementById('message').innerText = 'If that email exists, a reset link has been sent.';
                document.getElementById('error').innerText = '';
            } else {
                document.getElementById('error').innerText = 'Error sending reset link. Please try again.';
            }
        });
    </script>
</body>
</html>
