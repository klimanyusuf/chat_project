<!DOCTYPE html>
<html>
<head>
    <title>Reset Password - Chat App</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 400px; margin: 0 auto; padding: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; }
        input { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 10px 20px; background: #0084ff; color: white; border: none; border-radius: 4px; cursor: pointer; }
        .error { color: red; }
    </style>
</head>
<body>
    <h2>Reset Password</h2>
    <form id="reset-form">
        <div class="form-group">
            <label>New Password</label>
            <input type="password" id="password" required>
        </div>
        <div class="form-group">
            <label>Confirm New Password</label>
            <input type="password" id="password2" required>
        </div>
        <button type="submit">Reset Password</button>
        <div id="error" class="error"></div>
    </form>

    <script>
        // Extract token and uid from URL (expected format: /reset-password/<uidb64>/<token>/)
        const pathParts = window.location.pathname.split('/');
        const uidb64 = pathParts[2];
        const token = pathParts[3];
        
        document.getElementById('reset-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const password = document.getElementById('password').value;
            const password2 = document.getElementById('password2').value;
            
            if (password !== password2) {
                document.getElementById('error').innerText = 'Passwords do not match';
                return;
            }
            
            const response = await fetch(`/api/auth/reset-password/${uidb64}/${token}/`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ password, password2 })
            });
            
            if (response.ok) {
                alert('Password reset successful! Please login.');
                window.location.href = '/login/';
            } else {
                const data = await response.json();
                document.getElementById('error').innerText = data.error || 'Reset failed';
            }
        });
    </script>
</body>
</html>
